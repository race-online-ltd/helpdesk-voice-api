# ┌─────────────────────────────────────────────────────────────────┐
# │  FILE PATH:  ./docker-compose.yml                               │
# │  Placed at:  project root                                       │
# │  On the VM:  /opt/helpdesk-voice-api/docker-compose.yml     │
# └─────────────────────────────────────────────────────────────────┘

services:

  # ── Postgres ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: atc-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-ticket_classifier}
    volumes:
      # Named volume — survives container stop/rm/re-pull
      # Only "docker compose down -v" would delete this
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ticket_classifier}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI backend ──────────────────────────────────────────────
  backend:
    # IMAGE_NAME is exported in the CI deploy step before compose up
    image: ${IMAGE_NAME:-helpdesk-voice-api}:latest
    container_name: atc-backend
    env_file:
      # Written to /opt/helpdesk-voice-api/.env by CI pipeline
      - .env
    environment:
      # Overrides any DATABASE_URL in .env so it always hits the
      # compose db service by hostname, not localhost
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-ticket_classifier}
    ports:
      - "${APP_PORT:-8383}:8000"
    volumes:
      - media_data:/app/media
    networks:
      - atc-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # give entrypoint time to migrate

volumes:
  postgres_data:
    driver: local    # data lives in /var/lib/docker/volumes/atc_postgres_data
  media_data:
    driver: local

networks:
  atc-network:
    driver: bridge