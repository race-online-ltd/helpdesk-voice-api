version: '3.8'

services:
  # Database service (internal only — not exposed to the host)
  db:
    image: postgres:16-alpine
    container_name: atc-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-ticket_classifier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service — published on a dedicated host port
  backend:
    # Pull the pre-built image from Docker Hub.
    # Override DOCKER_IMAGE to deploy a specific tag (e.g., sha-abc1234).
    image: ${DOCKER_IMAGE:-${DOCKERHUB_USERNAME:-myorg}/auto-ticket-classifier:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atc-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-ticket_classifier}
    ports:
      # Exposed on a dedicated port so it doesn't clash with the asr-middleware
      # stack already running on this VM. Change BACKEND_PORT in .env as needed.
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - media_data:/app/media
    networks:
      - atc-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local

networks:
  # Isolated bridge network — no overlap with the asr-middleware stack.
  atc-network:
    driver: bridge
