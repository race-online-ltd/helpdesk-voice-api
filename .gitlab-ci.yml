stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $DOCKERHUB_USERNAME/helpdesk-voice-api
  DOCKER_TLS_CERTDIR: ""

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual
      allow_failure: true
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    - SHA_TAG="sha-$(echo $CI_COMMIT_SHORT_SHA)"
    - |
      docker build \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        -t "$IMAGE_NAME:latest" \
        -t "$IMAGE_NAME:$SHA_TAG" \
        .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$SHA_TAG"
    - echo "Pushed $IMAGE_NAME:latest and $IMAGE_NAME:$SHA_TAG"
  after_script:
    - docker logout

deploy:
  stage: deploy
  image: alpine:latest
  needs:
    - build-and-push
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$VM_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p ${VM_PORT:-22} $VM_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p ${VM_PORT:-22} $VM_USER@$VM_HOST "
        docker pull $IMAGE_NAME:latest &&
        docker stop auto-ticket || true &&
        docker rm auto-ticket || true &&
        docker run -d \
          --name auto-ticket \
          -p 8383:8000 \
          --restart always \
          $IMAGE_NAME:latest
      "