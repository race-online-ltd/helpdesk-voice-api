# GitLab CI/CD — builds and pushes the backend image to Docker Hub on every
# push to `main`.  A specific SHA tag is also created so you can pin a
# deployment to an exact commit.
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   DOCKERHUB_USERNAME  – your Docker Hub username
#   DOCKERHUB_TOKEN     – a Docker Hub access token (read/write scope)

stages:
  - build

variables:
  IMAGE_NAME: $DOCKERHUB_USERNAME/auto-ticket-classifier
  # Use Docker-in-Docker with TLS disabled (works with the docker:dind service).
  DOCKER_TLS_CERTDIR: ""

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    # Run on push / merge to main only.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    # Allow manual trigger from any branch for ad-hoc testing.
    - when: manual
      allow_failure: true
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    # Short SHA tag (matches the GitHub Actions sha- prefix convention).
    - SHA_TAG="sha-$(echo $CI_COMMIT_SHORT_SHA)"
    - |
      docker build \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        -t "$IMAGE_NAME:latest" \
        -t "$IMAGE_NAME:$SHA_TAG" \
        .
    # Push both tags.
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$SHA_TAG"
    # Print the exact image reference so it can be copy-pasted for the VM.
    - echo "Pushed $IMAGE_NAME:latest and $IMAGE_NAME:$SHA_TAG"
  after_script:
    - docker logout
