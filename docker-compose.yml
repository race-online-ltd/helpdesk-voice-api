services:

  # ── Postgres ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: atc-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-ticket_classifier}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helpdesk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ticket_classifier}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI backend ──────────────────────────────────────────────
  backend:
    image: ${IMAGE_NAME:-helpdesk-voice-api}:latest
    container_name: atc-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-ticket_classifier}
    ports:
      - "${APP_PORT:-8342}:8342"
    volumes:
      - media_data:/app/media
    networks:
      - helpdesk
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8342/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local

networks:
  helpdesk:
    external: true